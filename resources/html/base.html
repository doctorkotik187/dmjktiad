<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Does My Jungler Know There Is A Dragon?!</title>
    <link rel="icon" type="image/png" href="/img/favicon.png" />
    <link href="/css/screen.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <section class="section">
        <div class="container">
            <div class="header">
                <h1>Does My Jungler Know There Is A Dragon?!</h1>
                <p>Enter a Riot ID to check their jungling drake stats</p>
            </div>
            {% block content %}{% endblock %}
        </div>
    </section>

    <div id="loading-overlay" class="loading-overlay" style="display:none">
        <div class="loading-box">
            <span class="spinner"></span>
            <p>Fetching match history from Riot...</p>
            <p class="loading-sub">This may take 5-10 seconds</p>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
