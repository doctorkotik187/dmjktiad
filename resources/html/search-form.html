<div class="form-card">
  <form method="post" action="/check" data-loading>
    {% csrf-field %}
    <div class="search-row">
      <input class="search-input" type="text" name="riot-id" id="riot-id-input" placeholder="SummonerName#TAG" required list="recent-searches" />
      <datalist id="recent-searches">
      </datalist>
      <span class="search-hint">double-click to see recent searches</span>
      <select name="region">
        <option value="euw1">EUW</option>
        <option value="na1">NA</option>
        <option value="kr">KR</option>
        <option value="eun1">EUNE</option>
        <option value="br1">BR</option>
        <option value="la1">LA1</option>
        <option value="la2">LA2</option>
        <option value="tr1">TR</option>
        <option value="ru">RU</option>
        <option value="jp1">JP</option>
        <option value="oc1">OCE</option>
      </select>
      <button class="btn btn-primary" type="submit">Check</button>
    </div>
  </form>
</div>
