<div class="form-card">
  <form method="post" action="/check" data-loading>
    {% csrf-field %}
    <div class="search-row">
      <select name="region" id="region-select">
        <option value="euw">EUW</option>
        <option value="na">NA</option>
        <option value="kr">KR</option>
        <option value="eun">EUNE</option>
        <option value="br">BR</option>
        <option value="lan">LA1</option>
        <option value="las">LA2</option>
        <option value="tr">TR</option>
        <option value="ru">RU</option>
        <option value="jp">JP</option>
        <option value="oce">OCE</option>
      </select>
    </div>
    <div class="search-row">
      <input class="search-input" type="text" name="riot-id" id="riot-id-input" placeholder="SummonerName#TAG" required list="recent-searches" autocomplete="off" />
      <datalist id="recent-searches">
      </datalist>
      <button class="btn btn-primary" type="submit">Check</button>
    </div>
  </form>
</div>
